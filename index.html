<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awesome Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial;
}

/* 🌙 Light/Dark Mode */
body{
    transition:0.5s;
    color:white;
    background:#0f2027;
}

.dark{
    background:#ffffff;
    color:#000;
}

/* 🔝 Navbar */
nav{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(0,0,0,0.5);
    position:fixed;
    width:100%;
    top:0;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
}

/* 🌟 Hero */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* 🎯 Sections */
section{
    padding:80px 20px;
    text-align:center;
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.show{
    opacity:1;
    transform:translateY(0);
}

/* 💎 Cards */
.card{
    margin:20px auto;
