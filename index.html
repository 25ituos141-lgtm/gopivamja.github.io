<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* 🌈 Animated Gradient Background */
body{
    height:100vh;
    background: linear-gradient(-45deg, #00c6ff, #0072ff, #ff6a00, #ee0979);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
}

@keyframes gradientBG {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 💎 Glass Card */
.container{
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    color:white;
    width:350px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

/* 👤 Profile Image */
.container img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid white;
    margin-bottom:15px;
}

/* 🔥 Headings */
h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    font-size:16px;
    margin-bottom:20px;
}

/* 🚀 Buttons */
.btn{
    display:inline-block;
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:25px;
    background:white;
    color:#333;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#000;
    color:#fff;
}

/* ✨ Social Icons */
.social a{
    margin:0 10px;
    color:white;
    font-size:20px;
    text-decoration:none;
}

.social a:hover{
    color:#ffd700;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://via.placeholder.com/150" alt="Profile">
    
    <h1>Your Name</h1>
    <p>IT Student | Developer | Tech Enthusiast</p>
    
    <a href="#" class="btn">View Projects</a>
    <a href="#" class="btn">Contact Me</a>

    <div class="social">
        <a href="#">🌐</a>
        <a href="#">💻</a>
        <a href="#">📧</a>
    </div>
</div>

</body>
</html>
